<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --field:#0B3D2E;
    --field-deep:#082E22;
    --chalk:#F5F2EA;
    --gold:#C9A24B;
    --card-red:#B83227;
    --ink:#16201B;
    --line: rgba(245,242,234,0.12);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--field);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    padding: 16px;
  }

  .wrap{ max-width: 1100px; margin: 0 auto; }

  header{
    padding-bottom:18px; margin-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }
  .title-block .eyebrow{
    font-family:'Oswald', sans-serif;
    font-size:12px; letter-spacing:0.18em; text-transform:uppercase;
    color: var(--gold); margin:0 0 4px;
  }
  .title-block h1{
    font-family:'Oswald', sans-serif;
    font-weight:700; font-size: 28px;
    line-height:1; margin:0; text-transform:uppercase;
  }
  .title-block .sub{
    font-size:13px; color: rgba(245,242,234,0.6); margin-top:6px;
  }

  .update-panel{
    display:flex; align-items:center; gap:14px; margin-top: 12px;
  }
  .last-update{
    font-size:12px; color: rgba(245,242,234,0.55);
  }
  .last-update strong{ display:block; color: var(--chalk); font-size:13px; }

  #refresh-btn{
    font-family:'Oswald', sans-serif;
    font-weight:600; font-size:13px;
    background: var(--gold);
    color: var(--ink);
    border:none; border-radius:6px;
    padding:13px 18px;
    cursor:pointer;
  }

  #debug-panel{
    background: #1a1a1a;
    border: 2px solid var(--card-red);
    border-radius: 8px;
    padding: 14px;
    margin: 16px 0;
    font-family: monospace;
    font-size: 12px;
    color: #ff6b6b;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }
  #debug-panel.success{
    border-color: #4CAF50;
    color: #4CAF50;
  }
  #debug-panel.loading{
    border-color: var(--gold);
    color: var(--gold);
  }

  .section-label{
    font-family:'Oswald', sans-serif;
    font-size:13px; letter-spacing:0.14em; text-transform:uppercase;
    color: rgba(245,242,234,0.55);
    margin: 20px 0 12px;
  }

  .matches-row{
    display:flex; gap:10px; overflow-x:auto; padding-bottom:14px;
  }
  .match-card{
    flex: 0 0 auto;
    min-width:150px;
    background: var(--field-deep);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
  }
  .match-card .grp{
    font-family:'Oswald'; font-size:10px;
    color: var(--gold); text-transform:uppercase; margin-bottom:6px;
  }
  .match-row{ display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .match-card .status{
    font-size:10px; color: rgba(245,242,234,0.4); margin-top:6px; text-transform:uppercase;
  }

  .groups-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap:16px;
  }
  .group-card{
    background: var(--field-deep);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .group-head{
    font-family:'Oswald', sans-serif;
    font-weight:600; font-size:14px;
    padding:12px 14px;
    background: rgba(201,162,75,0.1);
    border-bottom:1px solid var(--line);
  }

  table{ width:100%; border-collapse:collapse; font-size:12px; }
  thead th{
    text-align:left; font-family:'Oswald'; font-size:9px;
    color: rgba(245,242,234,0.45);
    padding:8px 6px 6px;
  }
  thead th.num, tbody td.num{ text-align:center; }
  tbody tr{ border-top:1px solid var(--line); }
  tbody td{ padding:7px 6px; }
  tr.qualify{ background: rgba(201,162,75,0.06); }
  td.pts{ font-family:'Oswald'; font-weight:700; color: var(--gold); text-align:center; }

  footer{
    margin-top:36px; padding-top:18px; border-top:1px solid var(--line);
    font-size:11px; color: rgba(245,242,234,0.4); text-align:center;
  }

  #toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background: var(--chalk); color: var(--ink);
    font-family:'Oswald'; font-size:13px; font-weight:600;
    padding:12px 20px; border-radius:8px;
    opacity:0; transition: opacity 0.25s ease;
    pointer-events:none; text-align:center;
  }
  #toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <p class="eyebrow">Canadá · México · EUA</p>
      <h1>Copa do Mundo 2026</h1>
      <p class="sub">Classificação da fase de grupos</p>
    </div>
    <div class="update-panel">
      <div class="last-update">
        <span>Última atualização</span>
        <strong id="update-time">Aguardando...</strong>
      </div>
      <button id="refresh-btn" onclick="handleRefreshClick()">Atualizar</button>
    </div>
  </header>

  <div id="debug-panel" class="loading">🔄 Iniciando conexão...</div>

  <p class="section-label">Jogos recentes</p>
  <div class="matches-row" id="matches-row"></div>

  <p class="section-label">Classificação</p>
  <div class="groups-grid" id="groups-grid"></div>

  <footer>Dados via football-data.org</footer>
</div>

<div id="toast"></div>

<script>
// ⚠️ COLOQUE SUA CHAVE AQUI (pegue em football-data.org/client/register)
const API_KEY = "90248faa2d8e38c19a5f4f0f2660f956";
const API_BASE = "https://api.football-data.org/v4";

// ID da Copa do Mundo na API (pode variar, vamos testar)
const COMPETITION_ID = "WC"; // World Cup

const debugPanel = document.getElementById('debug-panel');

function debug(msg, type = 'loading') {
  console.log(msg);
  debugPanel.textContent = msg;
  debugPanel.className = type;
}

async function apiFetch(endpoint) {
  const url = `${API_BASE}/${endpoint}`;
  debug(`🔄 Buscando: ${endpoint}\nURL: ${url}`);
  
  const res = await fetch(url, {
    headers: { 
      "X-Auth-Token": API_KEY
    }
  });
  
  debug(`📡 Status HTTP: ${res.status}`);
  
  if (res.status === 403) {
    throw new Error("Chave inválida ou não autorizada (403). Verifique sua token em football-data.org");
  }
  if (res.status === 429) {
    throw new Error("Limite de requisições atingido. Aguarde alguns minutos.");
  }
  if (!res.ok) {
    throw new Error(`Erro HTTP ${res.status}`);
  }
  
  const json = await res.json();
  debug(`✅ Resposta recebida (${JSON.stringify(json).length} bytes)`);
  
  return json;
}

const TEAM_NAMES = {
  "Brazil": "Brasil", "Germany": "Alemanha", "Argentina": "Argentina",
  "France": "França", "England": "Inglaterra", "Spain": "Espanha",
  "Netherlands": "Holanda", "Portugal": "Portugal", "Mexico": "México",
  "USA": "Estados Unidos", "Canada": "Canadá", "Japan": "Japão"
};

async function carregarDados() {
  try {
    debug(`🔑 Testando API Key...\nCompetition: ${COMPETITION_ID}`);
    
    // Teste 1: Verificar se a chave funciona
    const testRes = await apiFetch("competitions");
    debug(`✅ Chave válida! Total de competições: ${testRes.competitions?.length || 0}`);
    
    // Teste 2: Buscar Copa do Mundo
    let wcCompetition = null;
    if (testRes.competitions) {
      wcCompetition = testRes.competitions.find(c => 
        c.code === "WC" || c.name.includes("World Cup")
      );
    }
    
    if (!wcCompetition) {
      debug(`⚠️ Copa do Mundo não encontrada na lista. Tentando ID direto...`);
    } else {
      debug(`✅ Copa encontrada: ${wcCompetition.name} (ID: ${wcCompetition.id})`);
    }
    
    // Buscar classificação
    const standingsData = await apiFetch(`competitions/${COMPETITION_ID}/standings`);
    debug(`✅ Classificação recebida: ${standingsData.standings?.length || 0} tabelas`);
    
    // Buscar jogos
    const fixturesData = await apiFetch(`competitions/${COMPETITION_ID}/matches?status=FINISHED&limit=20`);
    debug(`✅ Jogos recebidos: ${fixturesData.matches?.length || 0}`);
    
    // Processar classificação
    const standings = {};
    if (standingsData.standings) {
      standingsData.standings.forEach(table => {
        const letter = table.type === "TOTAL" ? "Geral" : (table.group || "A");
        if (!standings[letter]) standings[letter] = [];
        
        table.table.forEach(row => {
          standings[letter].push({
            team: TEAM_NAMES[row.team.name] || row.team.name,
            w: row.won, d: row.draw, l: row.lost,
            pts: row.points,
            gp: row.goalsFor, gc: row.goalsAgainst
          });
        });
      });
    }
    
    // Processar jogos
    const recentMatches = (fixturesData.matches || []).map(m => ({
      group: m.group || "-",
      home: TEAM_NAMES[m.homeTeam.name] || m.homeTeam.name,
      away: TEAM_NAMES[m.awayTeam.name] || m.awayTeam.name,
      hs: m.score.fullTime.home,
      as: m.score.fullTime.away,
      status: "FINAL"
    }));
    
    window.standings = standings;
    window.recentMatches = recentMatches;
    renderMatches();
    renderGroups();
    
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    debug(`✅ SUCESSO!\nGrupos: ${Object.keys(standings).length}\nJogos: ${recentMatches.length}`, 'success');
    showToast("✅ Dados carregados!");
    
  } catch (err) {
    debug(`❌ ERRO:\n${err.message}\n\nVerifique:\n1. Sua chave em football-data.org\n2. Se a Copa 2026 está disponível na API`, 'loading');
    showToast("❌ Erro: " + err.message);
  }
}

function renderMatches(){
  const row = document.getElementById('matches-row');
  if (!window.recentMatches || window.recentMatches.length === 0) {
    row.innerHTML = '<p style="color:rgba(245,242,234,0.5)">Nenhum jogo encontrado</p>';
    return;
  }
  row.innerHTML = window.recentMatches.map(m => `
    <div class="match-card">
      <div class="grp">Grupo ${m.group}</div>
      <div class="match-row"><span>${m.home}</span><span>${m.hs ?? '-'}</span></div>
      <div class="match-row"><span>${m.away}</span><span>${m.as ?? '-'}</span></div>
      <div class="status">${m.status}</div>
    </div>
  `).join('');
}

function renderGroups(){
  const grid = document.getElementById('groups-grid');
  if (!window.standings || Object.keys(window.standings).length === 0) {
    grid.innerHTML = '<p style="color:rgba(245,242,234,0.5)">Nenhuma classificação encontrada</p>';
    return;
  }
  grid.innerHTML = Object.entries(window.standings).map(([letter, teams]) => {
    const sorted = [...teams].sort((a,b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      return (b.gp - b.gc) - (a.gp - a.gc);
    });
    const rows = sorted.map((t, i) => {
      const sg = t.gp - t.gc;
      return `
      <tr class="${i < 2 ? 'qualify' : ''}">
        <td>${i+1}</td>
        <td>${t.team}</td>
        <td class="num">${t.w}</td>
        <td class="num">${t.d}</td>
        <td class="num">${t.l}</td>
        <td class="num">${t.gp}</td>
        <td class="num">${t.gc}</td>
        <td class="num">${sg > 0 ? '+'+sg : sg}</td>
        <td class="pts">${t.pts}</td>
      </tr>`;
    }).join('');
    return `
      <div class="group-card">
        <div class="group-head">Grupo ${letter}</div>
        <table>
          <thead><tr><th>#</th><th>Time</th><th class="num">V</th><th class="num">E</th><th class="num">D</th><th class="num">GP</th><th class="num">GC</th><th class="num">SG</th><th class="num">Pts</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join('');
}

async function handleRefreshClick(){
  await carregarDados();
}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

document.addEventListener("DOMContentLoaded", carregarDados);
</script>
</body>
</html>
